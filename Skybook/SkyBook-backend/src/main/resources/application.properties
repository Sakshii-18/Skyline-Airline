server.port=8080
spring.application.name=skybook-backend

# File-based H2 database - data is saved to disk in ./data/skybookdb.mv.db
# and survives app restarts (unlike an in-memory list).
spring.datasource.url=jdbc:h2:file:./data/skybookdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console for viewing saved data in the browser (viva-friendly):
# http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:file:./data/skybookdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
