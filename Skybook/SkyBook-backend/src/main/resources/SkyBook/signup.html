<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | SkyBook — Create Your Account</title>
<meta name="description" content="Create a free SkyBook account to save your bookings and view them anytime.">
<meta name="author" content="SkyBook Airlines">
<meta name="geo.placename" content="Pune, Maharashtra, India">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loading-screen"><div class="loader-spinner"></div></div>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="brand">✈ Sky<span>Book</span></a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="flights.html">Flights</a></li>
      <li><a href="booking.html">Booking</a></li>
      <li><a href="ticket.html">Ticket</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="my-bookings.html">My Bookings</a></li>
      <li class="nav-auth" id="nav-auth"></li>
    </ul>
    <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-card reveal">
    <h1>Create Your Account</h1>
    <p>Sign up to save your bookings and view them anytime in "My Bookings".</p>
    <div id="auth-error" class="auth-error"></div>
    <form id="signup-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="su-name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="su-password" placeholder="At least 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</section>

<footer class="footer">
  <div class="container footer-bottom">© 2026 SkyBook Airlines. All rights reserved.</div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
